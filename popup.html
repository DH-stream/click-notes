<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Notes</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      width: 260px;
      padding: 10px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 35%),
        linear-gradient(180deg, #0d131b 0%, #090e14 100%);
      color: #e5e7eb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .stack {
      display: grid;
      gap: 8px;
      padding: 6px;
      border-radius: 14px;
      background: rgba(11, 17, 25, 0.84);
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 8px 24px rgba(0, 0, 0, 0.28);
    }
    button {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: linear-gradient(180deg, #18212c, #111823);
      color: #f8fafc;
      border-radius: 11px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 6px rgba(0,0,0,0.25);
    }
    button:hover {
      background: linear-gradient(180deg, #1f2a37, #15202c);
      border-color: rgba(148, 163, 184, 0.32);
    }
    button:active { transform: translateY(1px); }
    #recordBtn {
      background: linear-gradient(180deg, #f4f4f5, #d9dde3);
      color: #080c11;
      border-color: rgba(255,255,255,0.72);
    }
    #recordBtn:hover { background: linear-gradient(180deg, #ffffff, #e9edf2); }
    #stopBtn {
      display: none;
      background: linear-gradient(180deg, #2a171a, #171012);
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.22);
    }
    #copyBtn {
      background: linear-gradient(180deg, #1a2736, #121c28);
      border-color: rgba(125, 150, 183, 0.25);
    }
    #clearBtn {
      color: #cbd5e1;
      background: linear-gradient(180deg, #121a25, #0f161f);
      border-color: rgba(148, 163, 184, 0.14);
    }
    #notesList {
      display: grid;
      gap: 6px;
      margin-top: 2px;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.14);
    }
    .note-row {
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: center;
      gap: 7px;
      min-height: 22px;
      font-size: 12px;
      color: #aeb8c7;
    }
    .note-row .num {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      color: #f8fafc;
      font-size: 11px;
      font-weight: 750;
    }
    .note-row .text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="stack">
    <button id="recordBtn">Record</button>
    <button id="stopBtn">Stop</button>
    <button id="copyBtn">Copy</button>
    <button id="clearBtn">Clear</button>
    <div id="notesList"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
