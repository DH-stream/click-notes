<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Notes</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      width: 260px;
      padding: 10px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 34%),
        #090d12;
      color: #e5e7eb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .stack {
      display: grid;
      gap: 8px;
      padding: 2px;
      border-radius: 12px;
      background: rgba(15, 20, 28, 0.72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    button {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: linear-gradient(180deg, #151b24, #0f141c);
      color: #f8fafc;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 1px 2px rgba(0,0,0,0.28);
    }
    button:hover {
      background: linear-gradient(180deg, #1b2430, #121922);
      border-color: rgba(148, 163, 184, 0.28);
    }
    button:active { transform: translateY(1px); }
    #recordBtn {
      background: linear-gradient(180deg, #f4f4f5, #d9dde3);
      color: #080c11;
      border-color: rgba(255,255,255,0.72);
    }
    #recordBtn:hover { background: linear-gradient(180deg, #ffffff, #e5e7eb); }
    #stopBtn {
      display: none;
      background: linear-gradient(180deg, #2a171a, #171012);
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.22);
    }
    #copyBtn { background: linear-gradient(180deg, #172033, #101827); }
    #clearBtn {
      color: #cbd5e1;
      background: linear-gradient(180deg, #111827, #0d1219);
    }
    #notesList {
      display: grid;
      gap: 6px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
    }
    .note-row {
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: center;
      gap: 7px;
      min-height: 22px;
      font-size: 12px;
      color: #aeb8c7;
    }
    .note-row .num {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      color: #f8fafc;
      font-size: 11px;
      font-weight: 750;
    }
    .note-row .text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="stack">
    <button id="recordBtn">Record</button>
    <button id="stopBtn">Stop</button>
    <button id="copyBtn">Copy</button>
    <button id="clearBtn">Clear</button>
    <div id="notesList"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
